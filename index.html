<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#d97706">
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css" />
  <title>Game Night</title>
</head>
<body class="min-h-screen">

  <!-- ── Header ────────────────────────────────────────── -->
  <header class="bg-white shadow-sm sticky top-0 z-30">
    <div class="max-w-2xl mx-auto px-4 py-3 flex items-center justify-between">
      <h1 class="text-lg font-bold text-gray-900 flex items-center gap-2">
        🎲 <span>Game Night</span>
      </h1>
      <button id="auth-button"
              class="btn btn-ghost text-sm">
        Log out
      </button>
    </div>
  </header>

  <!-- ── Main content ───────────────────────────────────── -->
  <main class="max-w-2xl mx-auto px-4 py-6">
    <div id="app"></div>
  </main>

  <!-- ── Game selection modal (rendered by gameSelectionModal.js) ── -->
  <div id="gameModal" class="modal hidden">
    <div class="modal-content">
      <h2 class="text-lg font-bold text-gray-900 mb-4">Select a Game</h2>

      <div class="space-y-3 mb-4">
        <input type="text" id="gameSearch" class="field"
               placeholder="Search by name…">
        <div class="flex items-center gap-2">
          <label for="gamePlayerCount" class="text-sm text-gray-600 shrink-0">Players:</label>
          <input type="number" id="gamePlayerCount" min="1" value="4" class="field w-24">
        </div>
      </div>

      <ul id="gameSelectionList" class="space-y-1 mb-4"></ul>

      <button id="closeModal" class="btn btn-secondary w-full">Cancel</button>
    </div>
  </div>

  <!-- ── Toast container ────────────────────────────────── -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 flex flex-col gap-2 pointer-events-none"></div>

  <!-- ── Auth gate ──────────────────────────────────────── -->
  <script type="module" src="./src/js/auth/session-check.js"></script>
  <script type="module" src="./src/js/app.js"></script>

</body>
</html>
