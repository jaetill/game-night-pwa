name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADMIN_NAMES: ${{ secrets.VITE_ADMIN_NAMES }}
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Platform integration (per ADR-0009): Sentry release tracking on every deploy.
  # Skips gracefully if SENTRY_AUTH_TOKEN secret is not configured.
  #
  # Note: GitHub Actions does NOT permit `secrets.X` in step-level `if:`
  # conditions. The pattern below promotes the secret to job-level env so the
  # `if` can read `env.SENTRY_AUTH_TOKEN` instead. This avoids the workflow-
  # validation failure that hit every push for the first half of the session.
  sentry-release:
    needs: deploy
    runs-on: ubuntu-latest
    continue-on-error: true   # Don't fail the workflow if Sentry isn't wired yet
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
      - name: Sentry release
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v1
        with:
          version: ${{ github.sha }}
          environment: prod
          sourcemaps: ./dist
