name: Deploy to GitHub Pages

on:
  push:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install root dependencies
        run: npm ci
      - name: Install lambda dependencies
        # tests/lambdaHandlers.test.js + lambdaHandlersChildProcess.test.js
        # load each handler from lambda/, which requires lambda/node_modules
        # (e.g. @sentry/aws-serverless, @octokit/rest, aws-jwt-verify).
        run: npm ci --prefix lambda
      - run: npm test

  build:
    needs: test
    runs-on: ubuntu-latest
    env:
      SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
      SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
      SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history for `releases set-commits --auto`
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_ADMIN_NAMES: ${{ secrets.VITE_ADMIN_NAMES }}
          # Sentry browser SDK is initialized only if VITE_SENTRY_DSN is
          # present at build time (src/js/sentry.js no-ops without it).
          # VITE_RELEASE_VERSION must equal the release name we create in
          # Sentry below so frontend events match the uploaded source maps.
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
          VITE_DEPLOY_ENV: production
          VITE_RELEASE_VERSION: ${{ github.sha }}

      # ── Sentry release + source map upload (BEFORE pages-artifact) ──
      # Has to run pre-artifact so we can strip the .map files out of dist/
      # afterwards. GitHub Pages should serve the minified JS only; Sentry
      # keeps the maps server-side for deobfuscation.
      - name: Upload source maps to Sentry
        if: env.SENTRY_AUTH_TOKEN != ''
        uses: getsentry/action-release@v3
        with:
          version: ${{ github.sha }}
          environment: prod
          sourcemaps: ./dist
          # set_commits=auto associates the release with all commits since
          # the previous release. Sentry then says "this error first appeared
          # in commit X" on the issue page.
          set_commits: auto
          finalize: true
      - name: Strip source maps from dist/ before publish
        if: always()
        run: |
          # Delete .map files and remove their //# sourceMappingURL= references
          # from sibling .js/.css so browsers don't 404-spam the console
          # looking for them.
          find dist -name '*.map' -type f -delete
          find dist -name '*.js' -type f -exec sed -i '/\/\/# sourceMappingURL=/d' {} +
          find dist -name '*.css' -type f -exec sed -i '/\/\*# sourceMappingURL=/d' {} +
          echo "Source maps stripped. Remaining files:"
          find dist -name '*.map' -o -name '*.js' | head -20

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

