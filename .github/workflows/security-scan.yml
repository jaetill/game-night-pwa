name: security-scan
on:
  pull_request:
    branches: [master]
  schedule:
    - cron: '0 9 * * 1'   # Monday 09:00 UTC

permissions:
  contents: read
  security-events: write

jobs:
  security-scan:
    uses: jaetill/agentic-dev-environment/.github/workflows/security-scan.yml@main
    secrets: inherit
