name: claude-triage-bot
# Invokes the triage-bot subagent (.claude/agents/triage-bot.md) when a new
# issue is opened. The agent classifies, labels, and adds an initial triage
# comment (severity, suspected component, reproduction sufficiency).
#
# This complements the feedback Lambda (per Standard 11) which already files
# user-feedback issues — triage-bot processes whatever lands in the issues
# queue regardless of source.

on:
  issues:
    types: [opened, reopened]

permissions:
  contents: read
  issues: write
  id-token: write

jobs:
  triage:
    # Skip if the issue was just opened by claude[bot] itself (e.g.
    # dep-watcher's weekly issue or drift-detector's drift report — those
    # are pre-classified and don't need re-triage).
    if: github.actor != 'claude[bot]' && !endsWith(github.actor, '[bot]')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Run triage-bot agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          show_full_output: true
          prompt: |
            Act as the triage-bot subagent defined in .claude/agents/triage-bot.md.

            A new issue was opened: #${{ github.event.issue.number }}.

            Steps:
            1. Read the issue:
                 gh issue view ${{ github.event.issue.number }}
            2. Classify the issue:
               - Type: bug / feature / question / docs / chore
               - Component (skim CLAUDE.md for the project's component map):
                 frontend / lambda-<name> / iac / docs / mcp / auth
               - Severity (if bug): blocker / major / minor / trivial
               - Reproducibility: clear-repro / needs-info / not-applicable
            3. Apply labels:
                 gh issue edit ${{ github.event.issue.number }} \
                   --add-label "type:<type>,component:<component>,severity:<sev>"
               Create labels first if they don't exist via `gh label create`.
            4. If the issue is missing reproduction steps for a bug, post a
               comment asking for them (template available in
               .claude/agents/triage-bot.md).
            5. Post a SINGLE triage comment via:
                 gh issue comment ${{ github.event.issue.number }} --body-file -

            Comment must:
              - Lead with `## Triage (claude-sonnet-4-6)`
              - Show the classification (type, component, severity, repro)
              - Identify likely-relevant files/agents to assign for follow-up
                (don't actually assign — leave the assign action to the human)
          claude_args: |
            --model claude-sonnet-4-6
            --permission-mode bypassPermissions
            --allowed-tools Bash,Read,Glob,Grep
            --append-system-prompt "Follow the platform standards in docs/standards/."
