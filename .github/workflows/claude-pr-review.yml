name: claude-pr-review
# Thin caller — ADR-0018. The workflow logic lives in the platform repo's
# reusable: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml
# Do NOT inline logic here — inlined copies are the drift ADR-0018 eliminates.
# To change review behavior, edit the reusable in the platform repo.
on:
  pull_request:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
jobs:
  review:
    uses: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml@67452a9c7b0a2b88d026cf46fe2d2af7fc42a7c1 # main 2026-06-19
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}