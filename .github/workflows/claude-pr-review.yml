name: claude-pr-review
# Thin caller — ADR-0018. The workflow logic lives in the platform repo's
# reusable: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml
# Do NOT inline logic here — inlined copies are the drift ADR-0018 eliminates.
# To change review behavior, edit the reusable in the platform repo.
on:
  pull_request:
    branches: [master]
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
jobs:
  review:
    uses: jaetill/agentic-dev-environment/.github/workflows/claude-pr-review.yml@6859953981679181b26d578453fe1c64b5a9bd0c # main 2026-06-27
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
